name: Deploy JSDoc to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build and deploy with Docker Compose
        run: |
          docker compose down --remove-orphans || true
          docker compose up -d --build
