name: npm-publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test
        
      - name: Publish to NPM Registry
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Setup Gitea Registry
        run: |
          npm config set @gkucmierz:registry https://gitea.7u.pl/api/packages/gkucmierz/npm/
          npm config set //gitea.7u.pl/api/packages/gkucmierz/npm/:_authToken ${{ secrets.LOCAL_PACKAGE_REGISTRY }}

      - name: Publish to Gitea Registry
        run: npm publish
